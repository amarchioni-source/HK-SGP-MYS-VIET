services:
  - type: web
    name: hk-sgp-mys-viet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    packages:
      - tesseract-ocr
      - tesseract-ocr-spa
      - poppler-utils
